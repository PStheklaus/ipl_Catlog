<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconic Pot & Leaves Nursery</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        🌿 IPL Nursery
    </div>

    <nav>

        <a href="#">Home</a>

        <a href="#">Plants</a>

        <a href="#">Pots</a>

        <a href="#">Offers</a>

        <a href="#">Contact</a>

        <button class="login-btn">
            Login
        </button>

    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>
            Bring Nature Into Your Home
        </h1>

        <p>

            Premium Indoor Plants • Outdoor Plants • Decorative Pots

        </p>

        <div class="search-box">

            <input
                type="text"
                placeholder="Search Plants or Pots..."
                id="searchBox">

            <button>

                Search

            </button>

        </div>

    </div>

</section>

<section class="categories">

<h2>Shop by Category</h2>

<div class="category-grid">

<div class="category-card">🌿 Indoor Plants</div>

<div class="category-card">🌳 Outdoor Plants</div>

<div class="category-card">🌸 Flowering Plants</div>

<div class="category-card">🪴 Decorative Pots</div>

</div>

</section>

<section class="featured">

<h2>Featured Products</h2>

<div class="product-grid" id="productGrid">

</div>

</section>

<footer>

<p>

© 2025 Iconic Pot & Leaves Nursery

</p>

</footer>

<script src="js/products.js"></script>

<script src="js/app.js"></script>

</body>
</html>
